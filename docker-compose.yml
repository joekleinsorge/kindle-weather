services:
  kindle-weather:
    image: kindle-weather:local
    build: .
    container_name: kindle-weather
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      - CACHE_EXPIRATION=1800
      - CACHE_CLEANUP_INTERVAL=3600
      - TIDE_CACHE_EXPIRATION=1800
      - LAUNCH_CACHE_EXPIRATION=900
      - LAUNCH_API_TIMEOUT_SECONDS=2
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=kindle-weather
    depends_on:
      - otel-collector
    volumes:
      - ./secrets:/etc/secrets:ro
    ports:
      - "8081:8080"
    healthcheck:
      test: [ "CMD", "/app/kindle-weather", "--healthcheck" ]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
