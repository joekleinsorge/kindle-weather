apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: weather-tls-cert
spec:
  secretName: weather-tls-cert
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  subject:
    organizations:
    - Kindle Weather
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  dnsNames:
  - weather.example.com
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
